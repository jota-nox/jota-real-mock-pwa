<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chart — Distribuição de gastos</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #efeae2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  }

  .card {
    width: 600px;
    height: 600px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.06);
    padding: 32px;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .header {
    height: 48px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }
  .header .title {
    font-size: 28px;
    font-weight: 700;
    color: #0c0c0c;
    letter-spacing: -0.4px;
    line-height: 1.05;
  }
  .header .title sup {
    font-size: 14px;
    font-weight: 600;
    vertical-align: super;
    margin-left: 2px;
    color: #0c0c0c;
  }
  .header .subtitle {
    font-size: 22px;
    font-weight: 500;
    color: #b8b3a8;
    margin-top: 2px;
    letter-spacing: -0.2px;
  }
  .smile {
    width: 32px;
    height: 16px;
    margin-top: 4px;
    flex-shrink: 0;
  }
  .smile path {
    stroke: #0c0c0c;
    stroke-width: 2.5;
    stroke-linecap: round;
    fill: none;
  }

  .chart-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding-top: 0;
    padding-bottom: 4px;
  }

  .donut {
    width: 352px;
    height: 352px;
    flex-shrink: 0;
  }

  .legend {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    height: 52px;
  }
  .legend-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .legend-row1 {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .legend-label {
    font-size: 13px;
    font-weight: 500;
    color: #0c0c0c;
  }
  .legend-row2 {
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding-left: 18px;
  }
  .legend-value {
    font-size: 13px;
    color: #0c0c0c;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
  }
  .legend-pct {
    font-size: 12px;
    color: #b8b3a8;
    font-variant-numeric: tabular-nums;
  }

  .footer {
    height: 12px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    color: #c4bfb6;
    font-size: 12px;
    font-weight: 500;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div>
      <div class="title">Distribuição de gastos<sup>(R$)</sup></div>
      <div class="subtitle">Abril 2026</div>
    </div>
    <svg class="smile" viewBox="0 0 32 16">
      <path d="M 4 2 Q 16 17 28 2"/>
    </svg>
  </div>

  <div class="chart-area">
    <svg class="donut" viewBox="0 0 100 100">
      <!-- Total: 11205. 4 categorias consolidadas:
           Insumos 4180 (37.3%) · yellow
           Folha 3250 (29.0%) · coral
           Outros 1975 (17.6%) · orange (engloba energia + transporte + alimentação + outros)
           Aluguel 1800 (16.1%) · lavender
           Stroke circumference = 2π × 35 ≈ 219.91 -->
      <g transform="rotate(-90 50 50)">
        <circle cx="50" cy="50" r="35" fill="none" stroke="#F9DA4A" stroke-width="20"
                stroke-dasharray="82.03 137.88" stroke-dashoffset="0"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="#F36F62" stroke-width="20"
                stroke-dasharray="63.78 156.13" stroke-dashoffset="-82.03"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="#F4A14D" stroke-width="20"
                stroke-dasharray="38.71 181.20" stroke-dashoffset="-145.81"/>
        <circle cx="50" cy="50" r="35" fill="none" stroke="#B5A2F8" stroke-width="20"
                stroke-dasharray="35.40 184.51" stroke-dashoffset="-184.52"/>
      </g>
    </svg>

    <div class="legend">
      <div class="legend-item">
        <div class="legend-row1">
          <span class="legend-swatch" style="background:#F9DA4A"></span>
          <span class="legend-label">Insumos</span>
        </div>
        <div class="legend-row2">
          <span class="legend-value">R$ 4.180</span>
          <span class="legend-pct">37%</span>
        </div>
      </div>
      <div class="legend-item">
        <div class="legend-row1">
          <span class="legend-swatch" style="background:#F36F62"></span>
          <span class="legend-label">Folha</span>
        </div>
        <div class="legend-row2">
          <span class="legend-value">R$ 3.250</span>
          <span class="legend-pct">29%</span>
        </div>
      </div>
      <div class="legend-item">
        <div class="legend-row1">
          <span class="legend-swatch" style="background:#F4A14D"></span>
          <span class="legend-label">Outros</span>
        </div>
        <div class="legend-row2">
          <span class="legend-value">R$ 1.975</span>
          <span class="legend-pct">18%</span>
        </div>
      </div>
      <div class="legend-item">
        <div class="legend-row1">
          <span class="legend-swatch" style="background:#B5A2F8"></span>
          <span class="legend-label">Aluguel</span>
        </div>
        <div class="legend-row2">
          <span class="legend-value">R$ 1.800</span>
          <span class="legend-pct">16%</span>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">www.jota.ai</div>
</div>

</body>
</html>
