<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Chart — Projeção até a moto</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #efeae2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
  }

  .card {
    width: 600px;
    height: 600px;
    background: #ffffff;
    border-radius: 24px;
    box-shadow: 0 1px 0 rgba(0, 0, 0, 0.04), 0 4px 16px rgba(0, 0, 0, 0.06);
    padding: 32px;
    display: flex;
    flex-direction: column;
  }

  .header {
    height: 48px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-shrink: 0;
  }
  .header .title {
    font-size: 28px;
    font-weight: 700;
    color: #0c0c0c;
    letter-spacing: -0.4px;
    line-height: 1.05;
  }
  .header .title sup {
    font-size: 14px;
    font-weight: 600;
    vertical-align: super;
    margin-left: 2px;
  }
  .header .subtitle {
    font-size: 22px;
    font-weight: 500;
    color: #b8b3a8;
    margin-top: 2px;
    letter-spacing: -0.2px;
  }
  .smile { width: 32px; height: 16px; margin-top: 4px; flex-shrink: 0; }
  .smile path { stroke: #0c0c0c; stroke-width: 2.5; stroke-linecap: round; fill: none; }

  .chart-body {
    margin-top: 28px;
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 14px;
    height: 408px;
  }
  .y-axis {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-end;
    color: #b8b3a8;
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .plot {
    position: relative;
    background: repeating-linear-gradient(to bottom, transparent 0, transparent calc(20% - 1px), rgba(0,0,0,0.06) calc(20% - 1px), rgba(0,0,0,0.06) 20%);
    border-bottom: 1px solid rgba(0, 0, 0, 0.15);
  }
  .target-line {
    position: absolute;
    left: 0; right: 0;
    border-top: 2px dashed #F36F62;
    z-index: 2;
  }
  .target-line .lbl {
    position: absolute;
    top: -22px;
    right: 0;
    background: #F36F62;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .bars {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    padding: 0 6px;
  }
  .bar {
    width: 32px;
    background: #88E0B5;
    border-radius: 3px 3px 0 0;
    position: relative;
  }
  .bar.last { background: #F9DA4A; }
  .bar .val {
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 600;
    color: #0c0c0c;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .x-axis {
    display: grid;
    grid-template-columns: 56px 1fr;
    gap: 14px;
    padding-top: 8px;
  }
  .x-axis-labels {
    display: flex;
    justify-content: space-around;
    color: #b8b3a8;
    font-size: 12px;
    font-weight: 500;
    padding: 0 6px;
  }
  .x-axis-labels span { width: 32px; text-align: center; }

  .footer {
    height: 12px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    margin-top: 6px;
    flex-shrink: 0;
    color: #c4bfb6;
    font-size: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div>
      <div class="title">Projeção até a moto<sup>(R$)</sup></div>
      <div class="subtitle">R$ 650 / mês · meta R$ 5.850</div>
    </div>
    <svg class="smile" viewBox="0 0 32 16">
      <path d="M 4 2 Q 16 17 28 2"/>
    </svg>
  </div>

  <div class="chart-body">
    <div class="y-axis">
      <span>6k</span>
      <span>4,5k</span>
      <span>3k</span>
      <span>1,5k</span>
      <span>0</span>
    </div>
    <div class="plot">
      <div class="target-line" style="bottom: 97.5%"><span class="lbl">Meta · R$ 5.850</span></div>
      <div class="bars">
        <!-- Cumulative R$ 650/mês × 9 meses; max ref 6000 -->
        <div class="bar" style="height: 10.8%"><span class="val">650</span></div>
        <div class="bar" style="height: 21.7%"><span class="val">1,3k</span></div>
        <div class="bar" style="height: 32.5%"><span class="val">1,95k</span></div>
        <div class="bar" style="height: 43.3%"><span class="val">2,6k</span></div>
        <div class="bar" style="height: 54.2%"><span class="val">3,25k</span></div>
        <div class="bar" style="height: 65.0%"><span class="val">3,9k</span></div>
        <div class="bar" style="height: 75.8%"><span class="val">4,55k</span></div>
        <div class="bar" style="height: 86.7%"><span class="val">5,2k</span></div>
        <div class="bar last" style="height: 97.5%"><span class="val">5,85k</span></div>
      </div>
    </div>
  </div>

  <div class="x-axis">
    <div></div>
    <div class="x-axis-labels">
      <span>Mai</span><span>Jun</span><span>Jul</span><span>Ago</span><span>Set</span><span>Out</span><span>Nov</span><span>Dez</span><span>Jan</span>
    </div>
  </div>

  <div class="footer">www.jota.ai</div>
</div>

</body>
</html>
